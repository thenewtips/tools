<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>thenewtips · Ethical Learning Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#eef3f9;
}
header{
background:#0b1f33;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}
.container{padding:15px;}
.box{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
input,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}
button{
background:#0b1f33;
color:white;
font-weight:bold;
cursor:pointer;
}
nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
position:sticky;
top:0;
}
nav button{
background:none;
color:#0b1f33;
border:none;
font-weight:bold;
}
.section{display:none;}
.active{display:block;}
.adminBar{
background:#111;
color:white;
padding:10px;
text-align:center;
}
.del{
background:red;
margin-top:5px;
}
.hidden{display:none;}
iframe{width:100%;height:220px;margin-top:10px;}
img{width:100%;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<header>thenewtips · Ethical Compass</header>

<!-- LOGIN -->
<div id="auth" class="container">
<div class="box">
<h3 id="authTitle">Login</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="pass" type="password" placeholder="Password">
<button onclick="auth()">Login</button>
<p id="switch" style="text-align:center;margin-top:10px;">
New user? <a href="#" onclick="switchMode()">Create account</a>
</p>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div id="adminBar" class="adminBar hidden">
ADMIN PANEL |
<button onclick="toggleEdit()">Edit Mode</button>
<button onclick="logout()">Logout</button>
</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('tools')">Tools</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="section active">
<div class="box">
<h3>Ethical Hacking</h3>
<p id="homeText"></p>
<textarea id="homeEdit" class="hidden"></textarea>
<button id="saveHome" class="hidden" onclick="saveHome()">Save</button>
<div style="margin-top:10px;color:red;font-size:13px;">
Disclaimer: Educational purpose only.
</div>
</div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<div id="videoList"></div>
<div id="videoAdd" class="box hidden">
<input id="videoUrl" placeholder="YouTube URL">
<button onclick="addVideo()">Add Video</button>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="section">
<div id="toolList"></div>
<div id="toolAdd" class="box hidden">
<input id="toolName" placeholder="Tool Name">
<input id="toolDesc" placeholder="Description">
<input id="toolImg" placeholder="Image URL">
<input id="toolLink" placeholder="Tool Link">
<button onclick="addTool()">Add Tool</button>
</div>
</div>

</div>
</div>

<script>

const ADMIN_M="9399687115";
const ADMIN_P="seetaram1";

let isAdmin=false;
let edit=false;
let register=false;

if(localStorage.getItem("session")){
document.getElementById("auth").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

if(localStorage.getItem("session")=="admin"){
isAdmin=true;
document.getElementById("adminBar").classList.remove("hidden");
}
}

document.getElementById("homeText").innerText=
localStorage.getItem("homeText") ||
"Learn ethical hacking legally. Start with networking and Linux.";

function switchMode(){
register=!register;
document.getElementById("authTitle").innerText=register?"Register":"Login";
}

function auth(){
let m=document.getElementById("mobile").value;
let p=document.getElementById("pass").value;
let users=JSON.parse(localStorage.getItem("users")||"{}");

if(register){
if(users[m]){alert("Already registered");return;}
users[m]=p;
localStorage.setItem("users",JSON.stringify(users));
alert("Registered! Now login.");
register=false;
return;
}

if(m==ADMIN_M && p==ADMIN_P){
localStorage.setItem("session","admin");
location.reload();
return;
}

if(users[m]==p){
localStorage.setItem("session","user");
location.reload();
}else{
alert("Invalid login");
}
}

function logout(){
localStorage.removeItem("session");
location.reload();
}

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleEdit(){
if(!isAdmin)return;
edit=!edit;
document.getElementById("videoAdd").classList.toggle("hidden");
document.getElementById("toolAdd").classList.toggle("hidden");
document.getElementById("homeEdit").classList.toggle("hidden");
document.getElementById("saveHome").classList.toggle("hidden");
}

function saveHome(){
let txt=document.getElementById("homeEdit").value;
localStorage.setItem("homeText",txt);
document.getElementById("homeText").innerText=txt;
}

function addVideo(){
let url=document.getElementById("videoUrl").value;
let id=url.split("v=")[1]||url.split("/").pop();
let arr=JSON.parse(localStorage.getItem("videos")||"[]");
arr.push(id);
localStorage.setItem("videos",JSON.stringify(arr));
loadVideos();
}

function loadVideos(){
let arr=JSON.parse(localStorage.getItem("videos")||"[]");
let div=document.getElementById("videoList");
div.innerHTML="";
arr.forEach((v,i)=>{
div.innerHTML+=`
<div class="box">
<iframe src="https://www.youtube.com/embed/${v}" allowfullscreen></iframe>
${isAdmin&&edit?`<button class="del" onclick="delVideo(${i})">Delete</button>`:""}
</div>`;
});
}
function delVideo(i){
let arr=JSON.parse(localStorage.getItem("videos"));
arr.splice(i,1);
localStorage.setItem("videos",JSON.stringify(arr));
loadVideos();
}

function addTool(){
let name=document.getElementById("toolName").value;
let desc=document.getElementById("toolDesc").value;
let img=document.getElementById("toolImg").value;
let link=document.getElementById("toolLink").value;

let arr=JSON.parse(localStorage.getItem("tools")||"[]");
arr.push({name,desc,img,link});
localStorage.setItem("tools",JSON.stringify(arr));
loadTools();
}

function loadTools(){
let arr=JSON.parse(localStorage.getItem("tools")||"[]");
let div=document.getElementById("toolList");
div.innerHTML="";
arr.forEach((t,i)=>{
div.innerHTML+=`
<div class="box">
<img src="${t.img}">
<h4>${t.name}</h4>
<p>${t.desc}</p>
<a href="${t.link}" target="_blank">Open Tool</a>
${isAdmin&&edit?`<button class="del" onclick="delTool(${i})">Delete</button>`:""}
</div>`;
});
}
function delTool(i){
let arr=JSON.parse(localStorage.getItem("tools"));
arr.splice(i,1);
localStorage.setItem("tools",JSON.stringify(arr));
loadTools();
}

loadVideos();
loadTools();

</script>

</body>
</html>
